apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  labels:
    name: prometheus-server-conf
  namespace: prometheus-agent
data:
  prometheus.yml: |-
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']                
        relabel_configs:
        - target_label: customer_name
          replacement: "28-Thuega"
        - target_label: cluster
          replacement: "Production"
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace

        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: kubernetes_service_name

        - target_label: customer_name
          replacement: "28-Thuega"

        - target_label: metrics_service
          replacement: "kubernetes_prom_agent"

        - target_label: cloud_env
          replacement: azure
      - job_name: 'rabbitmq'
        static_configs:
          - targets: ['rabbitmq-cluster.thuega-as4-production.svc.cluster.local:15692']
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: kubernetes_service_name
          - target_label: customer_name
            replacement: "28-Thuega"
          - target_label: metrics_service
            replacement: "rabbitmq_prom_agent"
          - target_label: cloud_env
            replacement: azure
    remote_write:
    - url: 'http://10.57.1.12:9090/api/v1/write'
