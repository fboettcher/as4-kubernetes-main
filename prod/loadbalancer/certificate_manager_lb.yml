apiVersion: v1
kind: Service
metadata:
  name: certificate-manager-lb
  annotations:
    'service.beta.kubernetes.io/azure-load-balancer-internal': 'true'
    'service.beta.kubernetes.io/azure-load-balancer-internal-subnet': AKS-Loadbalancer
spec:
  type: LoadBalancer
  loadBalancerIP: 10.28.128.9
  selector:
    app.kubernetes.io/name: certificate-manager
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8080