    SPRING_RABBITMQ_HOST: 'rabbitmq-cluster.thuega-as4-production.svc.cluster.local'
    SPRING_RABBITMQ_PORT: '5672'
    SPRING_RABBITMQ_USERNAME: 'rabbitmq-admin'
    SPRING_RABBITMQ_PASSWORD: 'JKn1Cin4NBrQtKZ64UOUMNmZJPrdTAfg8i4mqU9gYT'
    SPRING_AUTOCONFIGURE_EXCLUDE: ''
    SPRING_CLOUD_STREAM_BINDERS_RABBIT_DEFAULTCANDIDATE: 'true'
    SPRING_CLOUD_STREAM_DEFAULTBINDER: 'rabbit'
    SPRING_CLOUD_STREAM_BINDINGS_CSREVENTPRODUCEROUT0_DESTINATION: 'csr.event'
    SPRING_CLOUD_STREAM_RABBIT_BINDINGS_CSREVENTPRODUCEROUT0_PRODUCER_ROUTINGKEYEXPRESSION: 'default'
    SPRING_CLOUD_STREAM_RABBIT_BINDINGS_CSREVENTPRODUCEROUT0_PRODUCER_EXCHANGETYPE: 'topic'

  resources:
    limits:
      cpu: 400m
      memory: 800Mi
    requests:
      cpu: 400m
      memory: 800Mi

  probes:
    liveness:
      enabled: true
      custom: true
      spec:
        httpGet:
          path: /as4-crypto-csr/api/v1/actuator/health
          port: 3333
    readiness:
      enabled: true
      custom: true
      spec:
        httpGet:
          path: /as4-crypto-csr/api/v1/actuator/health
          port: 3333
    startup:
      enabled: true
      custom: true
      spec:
        httpGet:
          path: /as4-crypto-csr/api/v1/actuator/health
          port: 3333
        failureThreshold: 900
        periodSeconds: 5

