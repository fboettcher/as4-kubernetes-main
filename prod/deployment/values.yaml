  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 2Gi

as4-cryptography-csr-helm:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
  tolerations:
      - key: "dedicatedTo"
        operator: "Equal"
        value: "as4-prod-microservices"
        effect: "NoExecute"
  affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: dedicatedTo
              operator: In
              values:
              - as4-prod-microservices
  env:
    TZ: Europe/Berlin
    DATASOURCE_URL: jdbc:postgresql://pgdb0528p01.postgres.database.azure.com:5432/db_28_b2bp01_as4_01?currentSchema=as4_csr
    DATASOURCE_USERNAME: 'tu_a_as4p01_as4_csr_01'
    DATASOURCE_PASSWORD: '83pAVEPCN5AdXGsqUQ5wr7D89qGfVnKqEdixOnK2xR'
    FSS_SERVER_API_URL: 'http://vmu0528fssp02.aep-az.int:4444/fss/api/v1'
    JDK_JAVA_OPTIONS: "-Djdk.tls.namedGroups=brainpoolP384r1,brainpoolP256r1,secp384r1,secp256r1"
