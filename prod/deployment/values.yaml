rabbitmq-cluster-operator:
  enabled: true
  rabbitmqImage:
    repository: bitnamilegacy/rabbitmq
  clusterOperator:
    image:
      repository: bitnamilegacy/rabbitmq-cluster-operator
    metrics:
      service:
        enabled: true
    replicaCount: 1
    resources:
      limits:
        cpu: 200m
        memory: 200Mi
      requests:
        cpu: 100m
        memory: 100Mi
  msgTopologyOperator:
    image:
      repository: bitnamilegacy/rmq-messaging-topology-operator
    resources:
      limits:
        cpu: 200m
        memory: 200Mi
      requests:
        cpu: 100m
        memory: 100Mi
  extraDeploy:
    - apiVersion: rabbitmq.com/v1beta1
      kind: RabbitmqCluster
      metadata:
        name: rabbitmq-cluster
      spec:
        persistence:
          storage: 128G
          storageClassName: "rabbitmq-node-storage"
        replicas: 3
        rabbitmq:
          additionalPlugins:
            - rabbitmq_shovel
            - rabbitmq_shovel_management
            - rabbitmq_top
          additionalConfig: |
            raft.wal_max_size_bytes = 16000000
            cluster_formation.target_cluster_size_hint = 3
            vm_memory_high_watermark.relative = 0.7
            reverse_dns_lookups = true
          envConfig: |
            RABBITMQ_DEFAULT_USER=rabbitmq-admin
            RABBITMQ_DEFAULT_PASS=JKn1Cin4NBrQtKZ64UOUMNmZJPrdTAfg8i4mqU9gYT
        tolerations:
          - key: "dedicatedTo"
            operator: "Equal"
            value: "as4-prod-rabbitmq"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: dedicatedTo
                  operator: In
                  values:
                  - as4-prod-rabbitmq
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: '2'
            memory: 4Gi

