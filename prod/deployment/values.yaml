as4-address-service-helm:
  enabled: true
  replicaCount: 2
  autoscaling:
    enabled: false
  tolerations:
      - key: "dedicatedTo"
        operator: "Equal"
        value: "as4-prod-microservices"
        effect: "NoExecute"
  affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: dedicatedTo
              operator: In
              values:
              - as4-prod-microservices
  env:
    TZ: "Europe/Berlin"
    RABBITMQ_HOST: rabbitmq-cluster.thuega-as4-production.svc.cluster.local
    RABBITMQ_PORT: '5672'
    RABBITMQ_USERNAME: 'rabbitmq-admin'
    RABBITMQ_PASSWORD: 'JKn1Cin4NBrQtKZ64UOUMNmZJPrdTAfg8i4mqU9gYT'
    DATASOURCE_URL: "jdbc:postgresql://pgdb0528p01.postgres.database.azure.com:5432/db_28_b2bp01_as4_01?currentSchema=as4_address&sslmode=prefer"
    DATASOURCE_USERNAME: "tu_a_as4p01_as4_address_01"
    DATASOURCE_PASSWORD: "Nke3N7VsfZIZKqyoatmRJfBuGcC1yCxBuk6W6KEGJi"
    DATASOURCE_TYPE: "postgres"
    FSS_SERVER_API_URL: 'http://vmu0528fssp02.aep-az.int:3331/fss/api/v1'
    LOGGING_LEVEL_ROOT: 'WARN'
    AUTOCONFIRMRELATION: 'true'
    PATHSWITCHINBOUNDEXCHANGENAME: 'as4.inbound'
    PATHSWITCHINBOUNDGROUP: 'pathswitch'
    PATHSWITCHOUTBOUNDEXCHANGENAME: 'as4.receipt.outbound'
    PATHSWITCHOUTBOUNDGROUP: 'pathswitch'
    EXTERNALEVENTPATHSWITCHEXCHANGENAME: 'as4.pathswitch.delivery'
