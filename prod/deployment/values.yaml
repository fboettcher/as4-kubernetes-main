      memory: 3Gi
    requests:
      cpu: 1500m
      memory: 3Gi

as4-crypto-operations-helm:
  enabled: true
  replicaCount: 3
  autoscaling:
    enabled: false
  tolerations:
      - key: "dedicatedTo"
        operator: "Equal"
        value: "as4-prod-microservices"
        effect: "NoExecute"
  affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: dedicatedTo
              operator: In
              values:
              - as4-prod-microservices
  env:
    TZ: Europe/Berlin
    SPRING_RABBITMQ_HOST: rabbitmq-cluster.thuega-as4-production.svc.cluster.local
    SPRING_RABBITMQ_PORT: '5672'
    SPRING_RABBITMQ_USERNAME: 'rabbitmq-admin'
    SPRING_RABBITMQ_PASSWORD: 'JKn1Cin4NBrQtKZ64UOUMNmZJPrdTAfg8i4mqU9gYT'
    FSS_SERVER_API_URL: 'http://vmu0528fssp02.aep-az.int:3331/fss/api/v1'
    SERVER_PORT: '8080'
    CLIENTTENANT_FSSSHAREDCLIENT: 'shared-client'
    SKIPRECEIPTVERIFICATION: 'true'
    USEADDRESSFROMCERTIFICATE: 'true'
    SPRING_PROFILES_ACTIVE: 'scaling'
    SPRING_CLOUD_STREAM_BINDINGS_DECRYPTANDVERIFYIN0_CONSUMER_CONCURRENCY: '10'
