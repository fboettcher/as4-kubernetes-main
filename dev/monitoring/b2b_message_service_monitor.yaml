---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: b2b-message-service
  namespace: monitoring
  labels:
    release: thuega-as4-dev-monitoring
spec:
  endpoints:
  - targetPort: 8080
    scheme: http
    path: /aep-b2b-message-service/actuator/prometheus
    interval: 15s
    scrapeTimeout: 14s
  selector:
    matchLabels:
      app.kubernetes.io/name: b2b-message-service
  namespaceSelector:
    any: true