---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: as4-cryptography-csr
  namespace: monitoring
  labels:
    release: thuega-as4-dev-monitoring
spec:
  endpoints:
  - targetPort: 3333
    scheme: http
    path: /as4-crypto-csr/api/v1/actuator/prometheus
    interval: 15s
    scrapeTimeout: 14s
  selector:
    matchLabels:
      app.kubernetes.io/name: as4-cryptography-csr
  namespaceSelector:
    any: true