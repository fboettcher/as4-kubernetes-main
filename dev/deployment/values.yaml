as4-address-service-helm:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
  tolerations:
      - key: "dedicatedTo"
        operator: "Equal"
        value: "as4-dev-microservices"
        effect: "NoExecute"
  affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: dedicatedTo
              operator: In
              values:
              - as4-dev-microservices
  env:
    MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: 'health, prometheus'
    TZ: "Europe/Berlin"
    RABBITMQ_HOST: 'rabbitmq-cluster.thuega-as4-dev.svc.cluster.local'
    RABBITMQ_PORT: '5672'
    RABBITMQ_USERNAME: 'rabbitmq-admin'
    RABBITMQ_PASSWORD: '07y46csCl0wdYorUEb8MPDeBynenG2BmKYLmPbePJy'
    DATASOURCE_URL: "jdbc:postgresql://pgdb0528d01.postgres.database.azure.com:5432/db_28_b2bq01_as4_01?currentSchema=as4_address&sslmode=prefer"
    DATASOURCE_USERNAME: "tu_a_as4q01_as4_address_01"
    DATASOURCE_PASSWORD: "wvjajmqvSKlKjCvzi2HyHqapC4LOeqVKHez88cFi4o"
    DATASOURCE_TYPE: "postgres"
    FSS_SERVER_API_URL: 'http://vmu0528fssd02.aep-az.int:3331/fss/api/v1'

    AUTOCONFIRMRELATION: 'false'
    PATHSWITCHINBOUNDEXCHANGENAME: 'as4.inbound'
    PATHSWITCHINBOUNDGROUP: 'pathswitch'
    PATHSWITCHOUTBOUNDEXCHANGENAME: 'as4.receipt.outbound'
    PATHSWITCHOUTBOUNDGROUP: 'pathswitch'
    EXTERNALEVENTPATHSWITCHEXCHANGENAME: 'as4.pathswitch.delivery'
    EXTERNALEVENTPATHSWITCHHEADERNAME: 'tenant'
    EXTERNALEVENTPATHSWITCHHEADERVALUES: ''

  resources:
    limits:
      cpu: 600m
      memory: 1200Mi
    requests:
      cpu: 600m
      memory: 1200Mi

  probes:
    liveness:
      enabled: true
      custom: true
      spec:
        httpGet:
          path: /aep-as4-address-service/actuator/health
          port: 8080
    readiness:
      enabled: true
      custom: true
      spec:
        httpGet:
          path: /aep-as4-address-service/actuator/health
          port: 8080
    startup:
      enabled: true
      custom: true
      spec:
        httpGet:
          path: /aep-as4-address-service/actuator/health
          port: 8080
        failureThreshold: 120
        periodSeconds: 5

