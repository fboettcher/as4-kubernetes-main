apiVersion: v1
kind: Service
metadata:
  name: crl-downloader-lb
  annotations:
    'service.beta.kubernetes.io/azure-load-balancer-internal': 'true'
    'service.beta.kubernetes.io/azure-load-balancer-internal-subnet': lbs_dev
spec:
  type: LoadBalancer
  loadBalancerIP: 10.30.128.5
  selector:
    app.kubernetes.io/name: crl-downloader
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8080